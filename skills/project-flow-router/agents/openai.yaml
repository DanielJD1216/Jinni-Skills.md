interface:
  display_name: "Project Flow Router"
  short_description: "Resolve live owners, prerequisites, and stop gates"
  default_prompt: >-
    Use $project-flow-router only when the literal invocation is the grammatical owner of a current routing action, not when its package is merely named or targeted by another owner. Treat delegation source identifiers as transport metadata, never target authority. Participate before browser bypass when an asserted existing authenticated session is required but its in-app Browser versus Chrome location is unknown; runtime defaults apply only to new browser work. Treat the live host catalog as availability truth and validate the complete routing profile whenever an operational decision may select or block an owner. A bypassed explicit live owner always uses direct-bypass. A participated, resolved non-Fabled route with no inspection or write uses route-only. Explicit denials and planning-only constraints override assume or as-if language and stop with condition-unmet. Keep prerequisite-sequence when returning only the first required owner. Inside active Fabled return one owner only, use compact-handoff, and derive preference_effect from that owner's actual automatic or conditional profile tier. Preserve consequential comprehension gates, fail-closed catalog handling, prerequisite denials, and bounded-local-write proof.
